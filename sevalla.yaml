# Sevalla configuration for IFC Clash Detection
version: '1'

services:
  - name: ifcclash-app
    type: web
    runtime: docker
    buildCommand: "docker build -t ifcclash-app ."
    healthCheckPath: "/api/health"
    envVars:
      - key: FLASK_ENV
        value: "production"
      - key: PORT
        value: "8080"

# Pipeline for Dev/QA/Prod environments
pipelines:
  - name: ifcclash-pipeline
    environments:
      - name: development
        services: [ifcclash-app]
      - name: production
        services: [ifcclash-app]

# Optional: Add database for storing clash results
databases:
  - name: ifcclash-db
    type: postgresql
    version: "15"
